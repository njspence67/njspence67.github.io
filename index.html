<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="d-flex flex-column justify-content-center align-items-center min-vh-100 w-100 bg-dark">

    <div class="card mx-auto" style="max-width: 600px; width: 100%;">
        <div class="card-body">
            <div class="row">
                <!-- Left card class -->
                <div id="location-section" class="col-4 d-flex flex-column justify-content-center align-items-center border-end">
                    <i class="bi bi-geo-alt-fill text-danger fs-1"></i>
                    <h4 class="text-danger fw-bold mt-2">Cookeville</h4>
                </div>
                <!-- Right card class -->
                <div class="col-8 d-flex flex-column align-items-center text-center">
                    <h5 class="text-muted mb-3">Current Conditions</h5>
                    <i id="weatherIcon" class="bi bi-clouds-fill fs-1 text-secondary"></i>
                    <p id="conditionText" class="mt-2">Overcast Clouds</p>
                    <hr class="w-100">
                    <!-- Temp and humiidy id and location -->
                    <div class="d-flex gap-4">
                        <span>
                            <i class="bi bi-thermometer-half text-warning"></i>
                            <span id="temperature">°</span>
                            <small>Temperature</small>
                        </span>
                        <span>
                            <i class="bi bi-droplet-fill text-primary"></i>
                            <span id="humidity">%</span>
                            <small>Humidity</small>
                        </span>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script>
        const apiUrl = "https://api.open-meteo.com/v1/forecast?latitude=36.192&longitude=-85.5&current=temperature_2m,relative_humidity_2m,weather_code&temperature_unit=fahrenheit";
        // Asked AI to crunch the numbers for expectations of weather conditions based on available data then added desciption to return
        function getWeatherDescription(code) {
            if (code === 0) return "Clear Sky";
            if (code === 1) return "Mainly Clear";
            if (code === 2) return "Partly Cloudy";
            if (code === 3) return "Overcast Clouds";
            return "Unknown";
        }
        // Asked AI to match the numbers for expectations of weather conditions based on available data to icons
        function getWeatherIcon(code) {
            if (code === 0) return "bi bi-sun-fill";
            if (code === 1 || code === 2) return "bi bi-cloud-sun-fill";
            if (code === 3) return "bi bi-clouds-fill";
            return "bi bi-cloud-fill";
        }
        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                // Pull the current values out of the API response, asked AI to help explain and code the matching json data from the variables created
                const temp = Math.round(data.current.temperature_2m);
                const humidity = data.current.relative_humidity_2m;
                const code = data.current.weather_code;
                document.querySelector("#temperature").innerText = temp + "F";
                document.querySelector("#humidity").innerText = humidity + "%";
                document.querySelector("#conditionText").innerText = getWeatherDescription(code);
                //only for icon
                document.querySelector("#weatherIcon").className = getWeatherIcon(code) + " fs-1 text-secondary";
            });
        // Functionality and accessability 
        function updateBorder() {
            const locationSection = document.querySelector("#location-section");
            if (window.innerWidth < 768) {
                locationSection.classList.remove("border-end");
                locationSection.classList.add("border-bottom");
            } else {
                locationSection.classList.remove("border-bottom");
                locationSection.classList.add("border-end");
            }
        }
        // Run on load and whenever the window is resized, asked AI for any last accessability implements 
        updateBorder();
        window.addEventListener("resize", updateBorder);
    </script>
</body>
</html>
